<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In – Dar Mink Beauty</title>
    <link rel="stylesheet" href="../css/signIn-signUp.css">
</head>
<body>

    <div class="auth-box">
        <h2>Sign In</h2>

        <div id="loginForm">
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">

            <!-- BUG FIX: removed wrapping <a> tag around button (it swallowed the click
                 before JS could preventDefault), removed inline onclick (module functions
                 are not global), changed id to match signIn.js ("emailSignInBtn") -->
            <button id="emailSignInBtn">Sign In</button>
            <button id="googleSignInBtn">Sign in with Google</button>

            <p>Don't have an account? <a href="./signup.html">Sign Up</a></p>
        </div>
    </div>

    <script type="module" src="../javascript/signIn.js"></script>
</body>
</html>
