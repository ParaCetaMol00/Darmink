<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>
    <link rel="stylesheet" href="../css/signIn-signUp.css">
</head>

<body>

    <div class="auth-box">

        <h2>Create Account</h2>

        <input type="text" id="fullName" placeholder="Full Name">
        <input type="email" id="email" placeholder="Email">
        <input type="tel" id="phone" placeholder="08123456780">
        <input type="password" id="password" placeholder="Password">
        <input type="password" id="confirmPassword" placeholder="Confirm Password">

       
        <button id="emailSignupBtn">Create Account</button>

        <button id="googleSignupBtn">Sign in with Google</button>

        <p>
            Already have an account?
            <a href="./signIn.html">Login</a>
        </p>

    </div>

    <script type="module" src="../javascript/signUp.js"></script>

</body>

</html>
