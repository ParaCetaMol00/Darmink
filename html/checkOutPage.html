<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout – Dar Mink</title>
    <link rel="stylesheet" href="../css/checkOutPage.css">
</head>
<body>

  <header class="header">
    <a href="../index.html" class="logo">
      <span class="logo-icon">DM</span>
      <span class="logo-text">Dar Mink</span>
    </a>
    <a href="../index.html" class="back-btn">← Continue Shopping</a>
  </header>

  <div class="checkout-page">

    <div class="cart-section">
      <h2>🛒 Your Cart</h2>
      <div id="cartItems">
        <p class="loading-msg">Loading your cart…</p>
      </div>
    </div>

    <div class="summary-section">

      <div class="summary-box">
        <h2>📋 Order Summary</h2>
        <div class="summary-row">
          <span>Subtotal</span>
          <span id="subtotal">₦0</span>
        </div>
        <div class="summary-row">
          <span>Delivery</span>
          <span>₦1,500</span>
        </div>
        <div class="summary-row total">
          <span>Total</span>
          <span id="totalAmount">₦1,500</span>
        </div>
      </div>

      <div class="form-box">
        <h2>🚚 Delivery Details</h2>

        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="deliveryName" placeholder="Your full name">
        </div>

        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" id="deliveryPhone" placeholder="08012345678">
        </div>

        <div class="form-group">
          <label>Delivery Address</label>
          <textarea id="deliveryAddress" placeholder="House number, street, area…"></textarea>
        </div>

        <div class="form-group">
          <label>State</label>
          <select id="deliveryState">
            <option value="">Select state</option>
            <option>Lagos</option>
            <option>Abuja</option>
            <option>Rivers</option>
            <option>Kano</option>
            <option>Oyo</option>
            <option>Enugu</option>
            <option>Anambra</option>
            <option>Delta</option>
            <option>Edo</option>
            <option>Kaduna</option>
            <option>Other</option>
          </select>
        </div>

        <div class="form-group">
          <label>Payment Method</label>
          <select id="paymentMethod">
            <option value="">Select payment method</option>
            <option value="transfer">Bank Transfer</option>
            <option value="pay_on_delivery">Pay on Delivery</option>
          </select>
        </div>

        <p class="error-msg" id="formError" style="display:none;">Please fill in all fields.</p>

        <br>
        <button class="place-order-btn" id="placeOrderBtn">Place Order 💄</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="successModal">
    <div class="modal">
      <div class="check">🎉</div>
      <h3>Order Placed!</h3>
      <p>Thank you for shopping with Dar Mink 💕<br>We'll contact you shortly to confirm your order.</p>
      <a href="../index.html" class="modal-btn">Back to Shop</a>
    </div>
  </div>

  <script type="module" src="../javascript/checkOutPage.js"></script>
</body>
</html>
